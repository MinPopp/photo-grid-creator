<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Grid Creator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Photo Grid Creator</h1>
        <div class="controls">
            <div class="control-group">
                <label for="cols">Columns</label>
                <input type="number" id="cols" min="1" max="10" value="3">
            </div>
            <div class="control-group">
                <label for="rows">Rows</label>
                <input type="number" id="rows" min="1" max="10" value="3">
            </div>
            <div class="control-group">
                <label for="border-size">Border <span id="border-size-value">10</span>px</label>
                <input type="range" id="border-size" min="0" max="50" value="10">
            </div>
            <div class="control-group">
                <label for="border-color">Color</label>
                <input type="color" id="border-color" value="#ffffff">
            </div>
            <div class="control-group">
                <label for="include-color">Include color</label>
                <input type="checkbox" id="include-color">
            </div>
            <div class="control-group">
                <label for="download-format">Format</label>
                <select id="download-format">
                    <option value="png">PNG</option>
                    <option value="jpeg">JPEG</option>
                </select>
            </div>
            <button id="download-btn" disabled>Download</button>
        </div>
    </header>

    <main>
        <section id="color-challenge">
            <h2>🎲 Color Challenge</h2>
            <div class="challenge-controls">
                <select id="palette-mode">
                    <option value="small">Small palette</option>
                    <option value="regular" selected>Regular palette</option>
                    <option value="random">Fully random</option>
                </select>
                <button id="roll-btn">Roll</button>
            </div>
            <div id="color-result" class="color-result hidden">
                <div id="color-swatch"></div>
                <div id="color-info">
                    <span id="color-name"></span>
                    <span id="color-hex"></span>
                </div>
                <button id="share-color-btn" title="Copy share link">🔗 Share</button>
            </div>
        </section>

        <div id="grid-container">
            <div id="drop-zone">
                <p>Drop images here or click to upload</p>
                <input type="file" id="file-input" multiple accept="image/*">
            </div>
            <div id="grid" style="display:none;"></div>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
